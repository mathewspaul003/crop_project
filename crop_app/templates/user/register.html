<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Smart Agriculture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

        :root {
            --g9: #0d2e10; --g8: #1b4e1e; --g6: #2e7d32; --g5: #388e3c; --g4: #4caf50;
            --g2: #a8e0a0; --g1: #d4f0d0; --g05: #f0faf0;
            --cream: #faf8f3; --ink: #1a1f14; --muted: #5a6354;
            --border: rgba(46, 125, 50, 0.12);
            --shadow-lg: 0 20px 50px rgba(13, 46, 16, 0.08);
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--ink);
            background-image: radial-gradient(circle at 100% 0%, rgba(46, 125, 50, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 0% 100%, rgba(168, 224, 160, 0.05) 0%, transparent 40%);
        }

        /* ── NAVIGATION (Aligned with Landing) ── */
        .landing-nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0 32px;
            min-height: 72px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .brand-logo {
            font-family: 'Instrument Serif', serif;
            font-size: 26px;
            color: var(--g8) !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .brand-logo svg {
            width: 28px;
            height: 28px;
            fill: var(--g6);
        }

        .nav-link-custom {
            font-size: 14px;
            font-weight: 600;
            color: var(--muted) !important;
            padding: 8px 16px !important;
            text-decoration: none;
            transition: color 0.2s;
        }

        .btn-premium {
            font-size: 14px;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary-custom {
            background: var(--g6);
            color: white !important;
        }

        .btn-primary-custom:hover {
            background: var(--g8);
            transform: translateY(-1px);
        }

        /* ── AUTH UI ── */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: white;
            border-radius: 32px;
            border: 1px solid rgba(46, 125, 50, 0.08);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            padding: 48px;
            position: relative;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-icon-wrap {
            width: 56px;
            height: 56px;
            background: var(--g05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
            border: 1px solid var(--g1);
        }

        .auth-title {
            font-family: 'Instrument Serif', serif;
            font-size: 38px;
            color: var(--g9);
            margin-bottom: 8px;
            letter-spacing: -0.8px;
        }

        .auth-subtitle {
            font-size: 16px;
            color: var(--muted);
        }

        .form-label {
            font-weight: 600;
            color: var(--g8);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-control {
            border-radius: 14px;
            padding: 14px 18px;
            border: 1.5px solid var(--border);
            background: var(--cream);
            transition: all 0.2s;
        }

        .form-control:focus {
            background: white;
            border-color: var(--g4);
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.08);
            outline: none;
        }

        .btn-auth {
            background: var(--g6);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
            font-size: 16px;
        }

        .btn-auth:hover {
            background: var(--g8);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.25);
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--muted);
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .auth-link {
            color: var(--g6);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .alert-custom {
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg landing-nav">
        <div class="container-fluid p-0">
            <a class="brand-logo" href="/">
                <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 2-8 2s2-8-5-8"/></svg>
                AgriIntel Hub
            </a>
            <div class="ms-auto d-flex gap-3">
                <a href="/login/" class="nav-link-custom d-none d-md-block">Already a Member?</a>
                <a href="/login/" class="btn-premium btn-primary-custom" style="padding: 8px 18px; font-size: 13px;">Login Instead</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="glass-card">
            <div class="auth-header">
                <div class="auth-icon-wrap">🌱</div>
                <h2 class="auth-title">Join the Community</h2>
                <p class="auth-subtitle">Start your journey to smarter farming today</p>
            </div>

            {% if msg %}
            <div class="alert alert-success alert-custom text-center mb-4">
                {{ msg }}
            </div>
            {% endif %}

            {% if error %}
            <div class="alert alert-danger alert-custom text-center mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" required placeholder="Ex: John">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" required placeholder="Ex: Doe">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="col-md-12 mb-2">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-auth mt-3">Create My Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login/" class="auth-link">Login Here</a>
            </div>
        </div>
    </div>


</body>

</html>
