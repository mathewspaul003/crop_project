<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback | AgriIntel Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
        :root{--g9:#0d2e10;--g8:#1b4e1e;--g6:#2e7d32;--g4:#4caf50;--g1:#d4f0d0;--g05:#f0faf0;--cream:#faf8f3;--ink:#1c2017;--muted:#6b7563;--faint:#9baa91;--border:#eceae4;--surface:#ffffff;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
        .page-body{padding:48px 0 80px;}
        .page-header{margin-bottom:40px;}
        .page-header h1{font-family:'Instrument Serif',serif;font-size:2.4rem;color:var(--g9);letter-spacing:-1px;font-weight:400;}
        .page-header p{color:var(--muted);font-size:15px;margin-top:6px;}
        .content-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px;max-width:640px;}
        .field-group{margin-bottom:24px;}
        .field-label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:10px;}
        .field-control{width:100%;padding:14px 18px;border:1px solid var(--border);border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);transition:border-color 0.2s,box-shadow 0.2s;outline:none;resize:vertical;}
        .field-control:focus{border-color:var(--g4);box-shadow:0 0 0 3px rgba(76,175,80,0.1);background:#fff;}
        .btn-submit{display:inline-flex;align-items:center;gap:10px;background:var(--g6);color:white;font-weight:700;font-size:15px;padding:14px 36px;border:none;border-radius:12px;cursor:pointer;transition:background 0.2s,transform 0.2s;margin-top:8px;}
        .btn-submit:hover{background:var(--g8);transform:translateY(-1px);}
        .info-row{display:flex;align-items:center;gap:12px;background:var(--g05);border:1px solid var(--g1);border-radius:14px;padding:16px 20px;margin-bottom:32px;}
        .info-row i{color:var(--g6);font-size:18px;flex-shrink:0;}
        .info-row p{font-size:14px;color:var(--muted);margin:0;line-height:1.5;}
    </style>
</head>
<body>
    {% include "user/user_header.html" %}
    <div class="page-body">
        <div class="container">
            <div class="page-header">
                <h1>Leave Feedback</h1>
                <p>Share your experience or suggestions to help us improve AgriIntel.</p>
            </div>
            <div class="content-card">
                <div class="info-row">
                    <i class="fa-solid fa-circle-info"></i>
                    <p>Your feedback goes directly to our product team. We read every submission.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="field-group">
                        <label class="field-label">Subject</label>
                        <input type="text" name="subject" class="field-control" placeholder="What is this about?" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Message</label>
                        <textarea name="message" class="field-control" rows="6" placeholder="Share your thoughts, ideas, or report an issue…" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-paper-plane"></i>
                        Send Feedback
                    </button>
                </form>
            </div>
        </div>
    </div>
    {% include "chatbot/chatbot.html" %}
</body>
</html>
