<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    :root {
        --bot-primary: #1b4332;
        --bot-accent: #2d6a4f;
        --bot-glass: rgba(255, 255, 255, 0.7);
        --bot-border: rgba(255, 255, 255, 0.4);
        --bot-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        --bot-gradient: linear-gradient(135deg, #1b4332 0%, #2d6a4f 100%);
    }

    /* Floating Button */
    #chatbot-fab {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 65px;
        height: 65px;
        background: var(--bot-gradient);
        color: white;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(27, 67, 50, 0.3);
        z-index: 9999;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #chatbot-fab:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 15px 35px rgba(27, 67, 50, 0.4);
    }

    #chatbot-fab.pulse {
        animation: botPulse 2.5s infinite;
    }

    @keyframes botPulse {
        0% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(27, 67, 50, 0.4);
        }

        70% {
            transform: scale(1.05);
            box-shadow: 0 0 0 20px rgba(27, 67, 50, 0);
        }

        100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(27, 67, 50, 0);
        }
    }

    /* Chat Window */
    #chatbot-window {
        position: fixed;
        bottom: 110px;
        right: 30px;
        width: 400px;
        max-width: calc(100vw - 60px);
        height: 600px;
        max-height: calc(100vh - 160px);
        background: var(--bot-glass);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid var(--bot-border);
        border-radius: 32px;
        display: none;
        flex-direction: column;
        box-shadow: var(--bot-shadow);
        z-index: 9999;
        overflow: hidden;
        animation: botEntrance 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    @keyframes botEntrance {
        from {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    /* Header */
    #chatbot-header {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px 25px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--bot-border);
    }

    #chatbot-header .bot-info {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .bot-avatar {
        width: 45px;
        height: 45px;
        background: var(--bot-gradient);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: white;
        box-shadow: 0 4px 10px rgba(27, 67, 50, 0.2);
    }

    .status-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        color: var(--bot-accent);
        background: rgba(45, 106, 79, 0.1);
        padding: 2px 8px;
        border-radius: 20px;
    }

    .status-dot {
        width: 6px;
        height: 6px;
        background: #22c55e;
        border-radius: 50%;
        box-shadow: 0 0 8px #22c55e;
    }

    /* Messages Area */
    #chatbot-messages {
        flex: 1;
        overflow-y: auto;
        padding: 25px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: transparent;
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 0, 0, 0.1) transparent;
    }

    .bot-msg {
        max-width: 85%;
        padding: 14px 18px;
        border-radius: 20px;
        font-size: 14px;
        line-height: 1.6;
        animation: botFadeIn 0.4s ease-out;
        position: relative;
    }

    @keyframes botFadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .bot-msg.user {
        align-self: flex-end;
        background: var(--bot-gradient);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 8px 20px rgba(27, 67, 50, 0.15);
    }

    .bot-msg.ai {
        align-self: flex-start;
        background: white;
        color: #1a1a1b;
        border-bottom-left-radius: 4px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.03);
    }

    /* Input Area */
    #chatbot-input-area {
        padding: 20px 25px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--bot-border);
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .input-wrapper {
        flex: 1;
        position: relative;
    }

    #chatbot-input-area input {
        width: 100%;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--bot-border);
        border-radius: 18px;
        padding: 12px 18px;
        outline: none;
        font-size: 14px;
        transition: all 0.3s;
        font-family: inherit;
    }

    #chatbot-input-area input:focus {
        background: white;
        border-color: var(--bot-accent);
        box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.1);
    }

    #chatbot-send-btn {
        background: var(--bot-gradient);
        color: white;
        border: none;
        min-width: 45px;
        height: 45px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 5px 15px rgba(27, 67, 50, 0.2);
    }

    #chatbot-send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(27, 67, 50, 0.3);
    }

    /* Typing Indicator */
    .typing-indicator {
        font-size: 11px;
        color: var(--bot-accent);
        font-weight: 600;
        margin-left: 25px;
        margin-bottom: 15px;
        display: none;
        animation: pulse 1s infinite alternate;
    }
</style>

<!-- FAB -->
<div id="chatbot-fab" onclick="toggleBotWindow()" class="pulse">
    <span style="display: flex; align-items: center; justify-content: center; transform: translateY(-2px);">🤖</span>
</div>

<!-- Window -->
<div id="chatbot-window">
    <div id="chatbot-header">
        <div class="bot-info">
            <div class="bot-avatar">🚜</div>
            <div>
                <div style="font-weight: 700; font-size: 15px; color: #1a1a1b;">Agri Assistant</div>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>AI Online</span>
                </div>
            </div>
        </div>
        <div onclick="toggleBotWindow()"
            style="cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: rgba(0,0,0,0.05); transition: all 0.2s;"
            onmouseover="this.style.background='rgba(0,0,0,0.1)'" onmouseout="this.style.background='rgba(0,0,0,0.05)'">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
    </div>

    <div id="chatbot-messages">
        <div class="bot-msg ai">
            Hello! I'm your Smart Agriculture assistant. How can I help you today? 🌱
        </div>
        {% if chatbot_crop %}
        <div class="bot-msg ai"
            style="font-size: 12px; background: rgba(255,255,255,0.4); border-color: var(--bot-border);">
            Currently assisting with: <b style="color: var(--bot-accent);">{{ chatbot_crop|title }}</b>
            {% if chatbot_stage %} <br> Stage: <b style="color: var(--bot-accent);">{{ chatbot_stage }}</b> {% endif %}
        </div>
        {% endif %}
    </div>

    <!-- Typing indicator inside the message area -->
    <div id="typing-indicator" class="typing-indicator">
        🚜 Agri Assistant is thinking...
    </div>

    <div id="chatbot-input-area">
        <div class="input-wrapper">
            <input type="text" id="botQuery" placeholder="Message Agri Assistant..."
                onkeypress="if(event.key==='Enter') sendBotMessage()">
        </div>
        <button id="chatbot-send-btn" onclick="sendBotMessage()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    function toggleBotWindow() {
        const win = document.getElementById('chatbot-window');
        const fab = document.getElementById('chatbot-fab');
        if (win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'flex';
            fab.classList.remove('pulse');
        } else {
            win.style.display = 'none';
        }
    }

    function sendBotMessage() {
        const input = document.getElementById('botQuery');
        const sendBtn = document.getElementById('chatbot-send-btn');
        const typing = document.getElementById('typing-indicator');
        const msg = input.value.trim();

        if (!msg || input.disabled) return;

        const container = document.getElementById('chatbot-messages');

        // Add User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'bot-msg user';
        userDiv.textContent = msg;
        container.appendChild(userDiv);

        // Prep UI state
        input.value = '';
        input.disabled = true;
        sendBtn.disabled = true;
        typing.style.display = 'block';
        container.scrollTop = container.scrollHeight;

        // Context (Standardized variables from Django views)
        const crop = "{{ chatbot_crop|default:'' }}";
        const stage = "{{ chatbot_stage|default:'' }}";
        const stage_id = "{{ chatbot_stage_id|default:'' }}";

        fetch("/chatbot/", {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `message=${encodeURIComponent(msg)}&crop=${encodeURIComponent(crop)}&stage=${encodeURIComponent(stage)}&stage_id=${encodeURIComponent(stage_id)}`
        })
            .then(res => res.json())
            .then(data => {
                // Reset UI State
                input.disabled = false;
                sendBtn.disabled = false;
                typing.style.display = 'none';
                input.focus();

                const aiDiv = document.createElement('div');
                aiDiv.className = 'bot-msg ai';
                // Parse markdown for premium formatting
                aiDiv.innerHTML = marked.parse(data.reply);
                container.appendChild(aiDiv);
                container.scrollTop = container.scrollHeight;
            })
            .catch(err => {
                input.disabled = false;
                sendBtn.disabled = false;
                typing.style.display = 'none';

                const errorDiv = document.createElement('div');
                errorDiv.className = 'bot-msg ai';
                errorDiv.style.color = 'red';
                errorDiv.textContent = "⚠️ Sorry, I encountered an error. Please try again.";
                container.appendChild(errorDiv);
                container.scrollTop = container.scrollHeight;
            });
    }
</script>
